[program:patronr-inbox-relay]
directory=/path/to/patronr
command=php bin/console app:async:inbox-relay --batch-size=20 --sleep-ms=500
user=your-user
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=30
stdout_logfile=/path/to/patronr/var/log/supervisor-inbox-relay.log
stderr_logfile=/path/to/patronr/var/log/supervisor-inbox-relay-error.log
environment=APP_ENV="prod"
